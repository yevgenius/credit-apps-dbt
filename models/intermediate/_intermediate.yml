version: 2

models:
  - name: int_application_status_events_deduped
    description: One row per (application_id, status), collapsing repeat events. Not exposed to BI tools directly - feeds int_application_funnel_stages.
    columns:
      - name: application_id
        tests:
          - not_null
      - name: status
        tests:
          - not_null
      - name: occurrence_count
        description: >
          >1 means this status fired more than once for this application.
          Worth eyeballing periodically - could be a legitimate re-decision
          (DECISIONED) or a system retry creating noise (anything else).
        tests:
          - not_null

  - name: int_application_funnel_stages
    description: One row per application_id with a timestamp for each funnel stage reached, plus current status. The pivot table fct_applications is built from.
    columns:
      - name: application_id
        tests:
          - unique
          - not_null
      - name: current_status
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['SUBMITTED', 'UNDERWRITING', 'DECISIONED', 'FUNDED', 'WITHDRAWN', 'EXPIRED']
